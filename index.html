<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#0B0B14">
<title>Gestión de Operaciones II — CTP Vázquez de Coronado</title>
<style>
:root{
  --bg:#0B0B14;--bg-soft:#121220;--surface:#1A1A2A;--line:rgba(255,255,255,.08);
  --text:#F4F4F8;--text-dim:#9B9BB0;
  --t1:#00E5C8;--t2:#FF3D8A;--t3:#8B5CF6;--t4:#FFB020;--t5:#00B4FF;--t6:#FF6B35;--t7:#F43F5E;--t8:#34D399;
  --good:#2BD576;--bad:#FF5470;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;height:100dvh;display:flex;justify-content:center;align-items:center}
#app{width:100%;max-width:480px;height:100dvh;position:relative;overflow:hidden;background:var(--bg)}
@media(min-width:540px){#app{border:1px solid var(--line);border-radius:24px;box-shadow:0 0 80px rgba(0,229,200,.08)}}

.view{position:absolute;inset:0;overflow-y:auto;display:none}
.view.active{display:block}

/* HOME */
#home{background:var(--bg);padding:24px 20px 40px}
.home-header{text-align:center;padding:32px 0 24px}
.home-header h1{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;letter-spacing:-0.01em;font-size:22px;font-weight:700;line-height:1.2}
.home-header p{color:var(--text-dim);font-size:13px;margin-top:8px}
.tag{display:inline-block;background:rgba(0,229,200,.12);color:var(--t1);border:1px solid rgba(0,229,200,.3);border-radius:20px;font-size:11px;padding:3px 10px;margin-bottom:12px;font-family:ui-monospace,SFMono-Regular,'Roboto Mono','SF Mono',Menlo,Consolas,monospace}
.tema-card{background:var(--surface);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid var(--line);cursor:pointer;transition:.15s}
.tema-card:hover{transform:translateY(-2px)}
.tema-card-top{display:flex;align-items:center;gap:12px}
.tema-icon{font-size:28px}
.tema-info h3{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;letter-spacing:-0.01em;font-size:15px;font-weight:600}
.tema-info p{font-size:12px;color:var(--text-dim);margin-top:2px}
.tema-bar{height:3px;border-radius:2px;margin-top:12px;background:var(--line)}
.tema-bar-fill{height:100%;border-radius:2px;width:0;transition:.4s}
.home-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px}
.btn{border:none;border-radius:12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;letter-spacing:-0.01em;font-size:14px;font-weight:600;cursor:pointer;padding:14px 20px;transition:.15s}
.btn:focus-visible{outline:3px solid var(--t1);outline-offset:2px}
.btn-primary{background:var(--t1);color:#0B0B14}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--line)}
.btn:hover{opacity:.88}
.btn-full{grid-column:1/-1}
.subarea-label{font-size:11px;color:var(--text-dim);font-family:ui-monospace,SFMono-Regular,'Roboto Mono','SF Mono',Menlo,Consolas,monospace;text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px;padding:0 2px}

/* STUDY */
#study{overflow:hidden;height:100dvh}
.study-bar{height:4px;background:var(--line);position:absolute;top:0;left:0;right:0;z-index:10;display:flex;gap:2px;padding:0 16px}
.study-seg{flex:1;background:var(--line);border-radius:2px;transition:.3s}
.study-seg.done{background:var(--t1)}
.study-exit{position:absolute;top:12px;right:16px;z-index:10;background:rgba(0,0,0,.5);border:none;color:var(--text-dim);width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.study-exit:focus-visible{outline:3px solid var(--t1)}
.cards-container{height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
.cards-container::-webkit-scrollbar{display:none}
.card{height:100dvh;scroll-snap-align:start;display:flex;flex-direction:column;justify-content:center;padding:40px 24px 32px;position:relative;overflow-y:auto;scroll-snap-stop:always}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,var(--card-color,#0B0B14) 0%,transparent 60%);opacity:.12;pointer-events:none;z-index:0}
.card>*{position:relative;z-index:1}
.card-type{font-size:11px;font-family:ui-monospace,SFMono-Regular,'Roboto Mono','SF Mono',Menlo,Consolas,monospace;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.card-emoji{font-size:52px;margin-bottom:16px}
.card-title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;letter-spacing:-0.01em;font-size:22px;font-weight:700;line-height:1.2;margin-bottom:10px}
.card-habilidad{font-size:13px;color:var(--text-dim);line-height:1.5;margin-bottom:20px;padding:10px 12px;background:var(--surface);border-radius:8px;border-left:3px solid var(--card-color)}
.card-body{font-size:14px;line-height:1.65;color:var(--text)}
.card-body h4{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;letter-spacing:-0.01em;font-size:13px;font-weight:600;color:var(--card-color);margin:16px 0 5px;text-transform:uppercase;letter-spacing:.04em}
.card-body ul{padding-left:18px}
.card-body li{margin-bottom:5px}
.card-body p{margin-bottom:8px}
.formula{background:var(--bg-soft);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-family:ui-monospace,SFMono-Regular,'Roboto Mono','SF Mono',Menlo,Consolas,monospace;font-size:13px;color:var(--card-color);margin:12px 0;line-height:1.7;white-space:pre-wrap}
.example{background:rgba(0,0,0,.3);border-radius:10px;padding:12px 14px;margin:10px 0;font-size:13px;line-height:1.65;border-left:3px solid var(--card-color)}
.example strong{color:var(--card-color)}
.badge-special{display:inline-block;background:rgba(255,180,32,.15);color:var(--t4);border:1px solid rgba(255,180,32,.3);border-radius:6px;font-size:11px;padding:2px 8px;font-family:ui-monospace,SFMono-Regular,'Roboto Mono','SF Mono',Menlo,Consolas,monospace;margin-bottom:10px}
.card-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:14px;border-top:1px solid var(--line);flex-shrink:0}
.card-counter{font-size:12px;color:var(--text-dim);font-family:ui-monospace,SFMono-Regular,'Roboto Mono','SF Mono',Menlo,Consolas,monospace}
.norma-table{width:100%;border-collapse:collapse;font-size:12px;font-family:ui-monospace,SFMono-Regular,'Roboto Mono','SF Mono',Menlo,Consolas,monospace;margin-top:10px}
.norma-table th{padding:6px;text-align:left;color:var(--card-color);border-bottom:1px solid var(--line)}
.norma-table td{padding:6px;border-bottom:1px solid var(--line);color:var(--text-dim)}
.norma-table tr:last-child td{border-bottom:none}

/* QUIZ */
#quiz{padding:0;height:100dvh;flex-direction:column}
.quiz-top{padding:14px 20px 0;flex-shrink:0}
.quiz-progress-bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:10px}
.quiz-progress-fill{height:100%;background:var(--t2);border-radius:2px;transition:.3s}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.quiz-meta span{font-size:12px;color:var(--text-dim);font-family:ui-monospace,SFMono-Regular,'Roboto Mono','SF Mono',Menlo,Consolas,monospace}
.quiz-exit{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:0}
.quiz-body{flex:1;overflow-y:auto;padding:4px 20px 24px}
.quiz-q{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;letter-spacing:-0.01em;font-size:17px;font-weight:600;line-height:1.45;margin:14px 0 20px}
.quiz-opts{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;font-size:14px;line-height:1.4;cursor:pointer;transition:.15s;text-align:left;color:var(--text);width:100%}
.opt:hover:not([disabled]){border-color:var(--t2);background:rgba(255,61,138,.07)}
.opt.correct{border-color:var(--good);background:rgba(43,213,118,.1);color:var(--good)}
.opt.wrong{border-color:var(--bad);background:rgba(255,84,112,.1);color:var(--bad)}
.opt.reveal{opacity:.45}
.opt[disabled]{cursor:default}
.quiz-exp{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-top:12px;font-size:13px;line-height:1.55;display:none}
.quiz-exp.show{display:block}
.quiz-exp-label{font-size:10px;font-family:ui-monospace,SFMono-Regular,'Roboto Mono','SF Mono',Menlo,Consolas,monospace;color:var(--t1);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.btn-next{width:100%;margin-top:12px;padding:15px;background:var(--t2);color:#fff;border-radius:12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;letter-spacing:-0.01em;font-size:15px;font-weight:600;border:none;cursor:pointer;display:none}
.btn-next.show{display:block}
.btn-next:focus-visible{outline:3px solid var(--t2);outline-offset:2px}

/* RESULTS */
#results{padding:24px 20px 40px}
.results-header{text-align:center;padding:8px 0 20px}
.results-header h2{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;letter-spacing:-0.01em;font-size:20px;font-weight:700}
.gauge-container{position:relative;width:160px;height:160px;margin:0 auto 16px}
.gauge-svg{transform:rotate(-90deg)}
.gauge-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.gauge-nota{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;letter-spacing:-0.01em;font-size:42px;font-weight:700}
.gauge-label{font-size:12px;color:var(--text-dim)}
.results-feedback{text-align:center;font-size:14px;margin:0 0 24px;padding:12px 16px;border-radius:12px;background:var(--surface);border-left:3px solid var(--t1);line-height:1.5}
.tema-breakdown{margin-bottom:24px}
.tema-breakdown h3,.failed-section h3{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;letter-spacing:-0.01em;font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em}
.breakdown-row{margin-bottom:12px}
.breakdown-row-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.breakdown-bar-bg{background:var(--line);border-radius:2px;height:5px}
.breakdown-bar-fill{height:100%;border-radius:2px;transition:.7s}
.failed-item{background:var(--surface);border-radius:10px;padding:12px 14px;margin-bottom:10px;border-left:3px solid var(--bad)}
.failed-item p{font-size:13px;line-height:1.5;margin-bottom:4px}
.failed-exp{font-size:12px;color:var(--text-dim);line-height:1.5;margin-top:6px;padding-top:6px;border-top:1px solid var(--line)}
.results-actions{display:grid;gap:10px;margin-top:24px}

@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ── Tipografía fluida ── */
.home-header h1{font-size:clamp(18px,5vw,24px)}
.card-title{font-size:clamp(17px,4.5vw,22px)}
.quiz-q{font-size:clamp(15px,4vw,18px)}
.gauge-nota{font-size:clamp(34px,9vw,46px)}
.results-header h2{font-size:clamp(17px,4.5vw,22px)}

/* ── Safe-area (notch en horizontal) ── */
#app{padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}

/* ── Celular angosto ≤374px ── */
@media(max-width:374px){
  .card{padding:36px 14px 24px}
  #home{padding:16px 14px 32px}
  .home-actions{grid-template-columns:1fr}
  .btn{padding:12px 16px;font-size:13px}
  .opt{padding:11px 13px;font-size:13px}
}

/* ── Pantalla baja ≤560px (landscape o teclado abierto) ── */
@media(max-height:560px){
  .card{padding:28px 20px 16px;padding-top:44px}
  .card-emoji{font-size:32px;margin-bottom:8px}
  .gauge-container{width:110px;height:110px}
  .gauge-svg{width:110px;height:110px}
  .gauge-nota{font-size:clamp(26px,7vw,34px)}
}

/* ── Botones de navegación táctil/teclado en modo Estudiar ── */
.study-nav{position:absolute;right:12px;bottom:72px;z-index:10;display:flex;flex-direction:column;gap:8px}
.study-nav-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:rgba(18,18,32,.88);backdrop-filter:blur(8px);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.study-nav-btn:disabled{opacity:.25;cursor:default}
.study-nav-btn:not(:disabled):hover{border-color:var(--t1);color:var(--t1)}
.study-nav-btn:focus-visible{outline:3px solid var(--t1);outline-offset:2px}

/* ── Feedback de intentos en quiz ── */
.quiz-attempt-msg{display:none;font-size:13px;padding:10px 14px;border-radius:10px;margin-top:10px;border:1px solid var(--bad);background:rgba(255,84,112,.08);color:var(--bad);line-height:1.4}
.quiz-attempt-msg.show{display:block}
.quiz-review-card{display:none;background:var(--surface);border:1px solid rgba(0,229,200,.25);border-radius:12px;padding:14px 16px;margin-top:10px;font-size:13px;line-height:1.6}
.quiz-review-card.show{display:block}
.quiz-review-title{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--t1);font-family:ui-monospace,SFMono-Regular,'Roboto Mono','SF Mono',Menlo,Consolas,monospace;margin-bottom:8px}
.opt.wrong-flash{animation:flash-red .5s ease}
@keyframes flash-red{0%{border-color:var(--bad);background:rgba(255,84,112,.15)}100%{border-color:var(--line);background:var(--surface)}}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="home" class="view active">
  <div class="home-header">
    <div class="tag">CTP Vázquez de Coronado · 2026</div>
    <h1>Gestión de la<br>Producción — II Examen</h1>
    <p>Ing. Dinia Navarro Blanco · 8 temas · 64 preguntas</p>
  </div>
  <div id="home-temas"></div>
  <div class="home-actions">
    <button class="btn btn-primary" onclick="startStudy()">📚 Estudiar todo</button>
    <button class="btn btn-secondary" onclick="startQuiz()">🎯 Quiz completo</button>
  </div>
</div>

<!-- STUDY -->
<div id="study" class="view">
  <div class="study-bar" id="study-bar"></div>
  <button class="study-exit" onclick="goHome()" title="Salir">✕</button>
  <div class="study-nav">
    <button class="study-nav-btn" id="btn-card-up" onclick="navCard(-1)" title="Tarjeta anterior" disabled>↑</button>
    <button class="study-nav-btn" id="btn-card-down" onclick="navCard(1)" title="Tarjeta siguiente">↓</button>
  </div>
  <div class="cards-container" id="cards-container"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="view">
  <div class="quiz-top">
    <div class="quiz-meta">
      <span id="quiz-tema-label"></span>
      <button class="quiz-exit" onclick="goHome()">✕</button>
    </div>
    <div class="quiz-meta" style="margin-top:2px">
      <span></span>
      <span id="quiz-counter" style="font-size:12px;color:var(--text-dim);font-family:ui-monospace,SFMono-Regular,'Roboto Mono','SF Mono',Menlo,Consolas,monospace"></span>
    </div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-prog"></div></div>
  </div>
  <div class="quiz-body">
    <div id="quiz-q" class="quiz-q"></div>
    <div id="quiz-opts" class="quiz-opts"></div>
    <div id="quiz-attempt-msg" class="quiz-attempt-msg"></div>
    <div id="quiz-review-card" class="quiz-review-card">
      <div class="quiz-review-title">💡 Repaso rápido</div>
      <div id="quiz-review-content"></div>
      <button class="btn btn-secondary" id="btn-go-study" style="width:100%;margin-top:10px;padding:10px;font-size:13px">📚 Ir a estudiar este tema</button>
    </div>
    <div id="quiz-exp" class="quiz-exp">
      <div class="quiz-exp-label">💡 Explicación</div>
      <div id="quiz-exp-text"></div>
    </div>
    <button id="btn-next" class="btn-next" onclick="nextQ()">Siguiente →</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results" class="view">
  <div class="results-header"><h2>Resultados del Quiz</h2></div>
  <div class="gauge-container">
    <svg class="gauge-svg" width="160" height="160" viewBox="0 0 160 160">
      <circle cx="80" cy="80" r="64" fill="none" stroke="var(--line)" stroke-width="14"/>
      <circle id="gauge-arc" cx="80" cy="80" r="64" fill="none" stroke="var(--t1)" stroke-width="14"
              stroke-linecap="round" stroke-dasharray="402.1" stroke-dashoffset="402.1"
              style="transition:stroke-dashoffset 1.2s ease"/>
    </svg>
    <div class="gauge-text">
      <div class="gauge-nota" id="gauge-nota">0</div>
      <div class="gauge-label">/ 100</div>
    </div>
  </div>
  <div class="results-feedback" id="results-feedback"></div>
  <div class="tema-breakdown"><h3>Desglose por tema</h3><div id="breakdown-list"></div></div>
  <div class="failed-section" id="failed-section"><h3>Preguntas falladas</h3><div id="failed-list"></div></div>
  <div class="results-actions">
    <button class="btn btn-primary" onclick="startQuiz()">🔁 Repetir quiz</button>
    <button class="btn btn-secondary" onclick="goHome()">🏠 Inicio</button>
  </div>
</div>

</div><!-- /app -->

<script>
/* ============================================================
   DATA
   ============================================================ */
const TEMAS = [
  {id:1, emoji:'🌐', nombre:'Estrategia de Operaciones Global', subarea:'Gestión de la Producción',
   habilidad:'Analizar la estrategia de operaciones en un entorno global (Cap. 2, Barry Render)',
   contenido:'Misión, estrategia, ventaja competitiva (diferenciación, costo, respuesta), 10 decisiones de AO, estrategias globales (internacional, multidoméstica, global, transnacional)', color:'--t1'},
  {id:2, emoji:'🚢', nombre:'Importaciones y Exportaciones', subarea:'Gestión de la Producción',
   habilidad:'Analizar principios básicos de importaciones y exportaciones, ligados a los procesos productivos',
   contenido:'Trueque, exportación, importación, productos tradicionales y no tradicionales, comercio internacional (definición, importancia, historia), guía aduanera', color:'--t2'},
  {id:3, emoji:'📦', nombre:'Stock de Seguridad', subarea:'Planeación y Control de la Producción',
   habilidad:'Calcular los stocks de seguridad, la determinación de las fechas de entrega y el cálculo de necesidades según las nuevas tendencias',
   contenido:'Stock de seguridad, proporciones, porcentajes, fórmula SS = Z × σD × √LT, punto de reorden (ROP)', color:'--t3'},
  {id:4, emoji:'⚡', nombre:'Just In Time (JIT)', subarea:'Planeación y Control de la Producción',
   habilidad:'Explicar en qué consiste el Sistema Just in Time (JIT)',
   contenido:'Origen Toyota, producción jalada vs empujada, 7 desperdicios (mudas), Kanban, Jidoka, Kaizen, ventajas y desventajas', color:'--t4'},
  {id:5, emoji:'🔩', nombre:'Teoría de las Limitaciones (TOC)', subarea:'Planeación y Control de la Producción',
   habilidad:'Identificar y aplicar la Teoría de las Limitaciones',
   contenido:'BUILDNET, SERVE, SPLIT, OPT, cuello de botella, 5 pasos de la TOC (Goldratt)', color:'--t5'},
  {id:6, emoji:'🎨', nombre:'Economía Naranja', subarea:'Planeación y Control de la Producción',
   habilidad:'Identificar escenarios de desarrollo sostenible en materia de la Economía Naranja',
   contenido:'Definición (BID 2013), sectores creativos, relación con ODS, ejemplos en Costa Rica', color:'--t6'},
  {id:7, emoji:'⚠️', nombre:'Riesgos del Trabajo', subarea:'Mantenimiento y Seguridad de las Operaciones',
   habilidad:'Distinguir los tipos de riesgos del trabajo',
   contenido:'Código de Trabajo Título IV Art. 193, accidentes de trabajo, póliza INS, tipos: físicos, químicos, biológicos', color:'--t7'},
  {id:8, emoji:'📋', nombre:'Normas ISO y OHSAS', subarea:'Mantenimiento y Seguridad de las Operaciones',
   habilidad:'Comparar normas de seguridad y calidad: OHSAS 18001, ISO 45001, ISO 9001 e ISO 14001',
   contenido:'OHSAS 18001 vs ISO 45001:2018, ISO 9001:2015 (calidad), ISO 14001:2015 (ambiental), cuadro comparativo, ciclo PHVA', color:'--t8'},
];

const STUDY = [
  /* ── TEMA 1 ── */
  {temaId:1, tipo:'portada', titulo:'Estrategia de Operaciones Global', cuerpo:''},
  {temaId:1, tipo:'concepto', titulo:'Misión y Estrategia', cuerpo:`
    <p>La <strong>misión</strong> define el propósito de la organización: qué hace, para quién y cómo crea valor.</p>
    <div class="formula">Misión → el PORQUÉ de la empresa
Estrategia → el CÓMO alcanzar esa misión</div>
    <p>La <strong>estrategia de operaciones</strong> debe alinearse con las metas corporativas y generar ventaja competitiva real.</p>
    <div class="example"><strong>Boeing:</strong> Su misión es ser líder mundial en aviación comercial y defensa. Su estrategia de AO incluye manufactura en múltiples países, alianzas globales y personalización de aeronaves para cada cliente.</div>
  `},
  {temaId:1, tipo:'concepto', titulo:'3 Formas de Ventaja Competitiva', cuerpo:`
    <h4>1. Diferenciación</h4>
    <p>El producto/servicio es único o superior. El cliente paga más porque percibe mayor valor.</p>
    <div class="example"><strong>Ejemplo:</strong> Apple diferencia por diseño y ecosistema → cobra precio premium.</div>
    <h4>2. Liderazgo en Costo</h4>
    <p>Producir con el menor costo posible para ofrecer precios bajos o mayor margen de ganancia.</p>
    <div class="example"><strong>Ejemplo:</strong> Walmart optimiza su cadena logística para vender más barato que cualquier competidor.</div>
    <h4>3. Respuesta</h4>
    <p>Ser ágil, confiable y flexible. Entregar rápido y adaptarse a cambios del mercado.</p>
    <div class="example"><strong>Ejemplo:</strong> Zara renueva sus colecciones en 2 semanas → respuesta ultrarrápida a las tendencias.</div>
  `},
  {temaId:1, tipo:'concepto', titulo:'10 Decisiones Estratégicas de AO', cuerpo:`
    <p>Render identifica <strong>10 decisiones</strong> que los gerentes de operaciones deben gestionar:</p>
    <ul>
      <li>1. Diseño de bienes y servicios</li>
      <li>2. Gestión de la calidad</li>
      <li>3. Diseño del proceso y capacidad</li>
      <li>4. Selección de localización</li>
      <li>5. Diseño de la distribución de instalaciones</li>
      <li>6. Recursos humanos y diseño del trabajo</li>
      <li>7. Gestión de la cadena de suministro</li>
      <li>8. Inventario y planificación de requerimientos</li>
      <li>9. Programación (producción y personal)</li>
      <li>10. Mantenimiento</li>
    </ul>
    <div class="formula">Cada decisión impacta: costo · calidad · velocidad · flexibilidad</div>
  `},
  {temaId:1, tipo:'concepto', titulo:'4 Estrategias de Operaciones Globales', cuerpo:`
    <h4>Internacional</h4>
    <p>Exporta usando competencias internas. Poca adaptación al mercado local.</p>
    <h4>Multidoméstica</h4>
    <p>Descentraliza decisiones. Cada subsidiaria se adapta completamente al país local.</p>
    <h4>Global</h4>
    <p>Alta estandarización del producto. Un solo producto para todo el mundo. Reduce costos.</p>
    <h4>Transnacional</h4>
    <p>Combina escala global + adaptación local. La más compleja de gestionar.</p>
    <div class="example"><strong>Transnacional:</strong> McDonald's usa el mismo sistema de franquicia global pero en Costa Rica ofrece el "Gallo Pinto Breakfast" adaptado al gusto tico.</div>
  `},
  {temaId:1, tipo:'especial', titulo:'Aspectos Culturales, Éticos y Trampas de Examen', cuerpo:`
    <div class="badge-special">⚠️ Caso especial / trampa de examen</div>
    <p>Las operaciones globales enfrentan desafíos culturales y éticos:</p>
    <ul>
      <li><strong>Corrupción</strong> — sobornos en algunos mercados vs. ética corporativa.</li>
      <li><strong>Condiciones laborales</strong> — estándares distintos entre países.</li>
      <li><strong>Propiedad intelectual</strong> — piratería de diseños y marcas.</li>
      <li><strong>Medio ambiente</strong> — regulaciones ambientales diferentes por país.</li>
    </ul>
    <div class="formula">Trampa: "Global" = estandarización y centralización.
"Internacional" = exportar sin adaptación local.
NO son lo mismo.</div>
  `},

  /* ── TEMA 2 ── */
  {temaId:2, tipo:'portada', titulo:'Importaciones y Exportaciones', cuerpo:''},
  {temaId:2, tipo:'concepto', titulo:'Trueque, Exportación e Importación', cuerpo:`
    <h4>Trueque</h4>
    <p>Intercambio directo de bienes o servicios <strong>sin uso de dinero</strong>. Forma más antigua de comercio.</p>
    <div class="example"><strong>Ejemplo:</strong> Costa Rica intercambia café por maquinaria agrícola alemana sin usar dólares.</div>
    <h4>Exportación</h4>
    <p>Venta de bienes o servicios producidos en el país a compradores en el <strong>extranjero</strong>.</p>
    <h4>Importación</h4>
    <p>Compra de bienes o servicios producidos en el <strong>extranjero</strong> para consumo nacional.</p>
    <div class="formula">Balanza comercial = Exportaciones − Importaciones
Positiva → Superávit | Negativa → Déficit</div>
  `},
  {temaId:2, tipo:'concepto', titulo:'Productos Tradicionales y No Tradicionales', cuerpo:`
    <h4>Exportaciones Tradicionales de Costa Rica</h4>
    <p>Históricamente dominantes en la balanza comercial:</p>
    <ul>
      <li>Café ☕</li>
      <li>Banano 🍌</li>
      <li>Azúcar</li>
      <li>Cacao</li>
    </ul>
    <h4>Exportaciones No Tradicionales</h4>
    <p>Más recientes, con mayor valor agregado:</p>
    <ul>
      <li>Dispositivos médicos (Costa Rica es líder per cápita mundial)</li>
      <li>Software y servicios tecnológicos</li>
      <li>Piña, melón, plantas ornamentales</li>
      <li>Servicios turísticos de alto valor</li>
    </ul>
    <div class="example"><strong>Dato histórico:</strong> Intel operó en Costa Rica (1997–2014) y fue la mayor exportación no tradicional del país durante ese período.</div>
  `},
  {temaId:2, tipo:'concepto', titulo:'Comercio Internacional', cuerpo:`
    <h4>Definición</h4>
    <p>Intercambio de bienes, servicios y capital entre países, regulado por acuerdos internacionales.</p>
    <h4>Importancia</h4>
    <ul>
      <li>Permite especialización según <strong>ventaja comparativa</strong>.</li>
      <li>Genera empleo y crecimiento económico.</li>
      <li>Acceso a bienes que no se producen localmente.</li>
    </ul>
    <h4>Historia</h4>
    <p>Ruta de la Seda (siglo II a.C.) → Colonialismo → GATT (1947) → OMC (1995). Costa Rica tiene TLC con EE.UU., Unión Europea, China y otros.</p>
    <div class="formula">OMC = Organización Mundial del Comercio
Fundada en 1995 · Regula el comercio global</div>
  `},
  {temaId:2, tipo:'concepto', titulo:'Guía Aduanera', cuerpo:`
    <h4>¿Qué es la Aduana?</h4>
    <p>Entidad gubernamental que controla el ingreso y salida de mercancías, cobra aranceles y verifica documentos. Costa Rica usa el <strong>CAUCA</strong> (Código Aduanero Uniforme Centroamericano).</p>
    <h4>Documentos clave</h4>
    <ul>
      <li><strong>Factura comercial</strong> — precio y descripción de la mercancía.</li>
      <li><strong>Declaración aduanera (DUA)</strong> — documento oficial ante la aduana.</li>
      <li><strong>Certificado de origen</strong> — dónde se fabricó el producto.</li>
      <li><strong>Conocimiento de embarque (B/L)</strong> — contrato de transporte marítimo.</li>
      <li><strong>Packing list</strong> — lista detallada del contenido del envío.</li>
    </ul>
    <div class="formula">Arancel = impuesto que cobra el país importador
Subsidio = ayuda económica al exportador nacional</div>
  `},
  {temaId:2, tipo:'especial', titulo:'Diferencias Clave para el Examen', cuerpo:`
    <div class="badge-special">⚠️ Trampas de examen</div>
    <ul>
      <li><strong>Trueque ≠ descuento</strong> — el trueque es sin dinero de por medio.</li>
      <li><strong>Tradicional ≠ artesanal</strong> — tradicional = históricamente dominante en la balanza.</li>
      <li><strong>Arancel ≠ subsidio</strong> — el arancel cobra al importador; el subsidio ayuda al exportador nacional.</li>
      <li><strong>Exportación directa</strong> = tú vendes directamente al extranjero. <strong>Exportación indirecta</strong> = a través de un intermediario.</li>
      <li><strong>Superávit</strong> = exportamos más de lo que importamos (favorable).</li>
    </ul>
  `},

  /* ── TEMA 3 ── */
  {temaId:3, tipo:'portada', titulo:'Stock de Seguridad', cuerpo:''},
  {temaId:3, tipo:'concepto', titulo:'¿Qué es y para qué sirve?', cuerpo:`
    <p>El <strong>stock de seguridad (SS)</strong> es un inventario adicional que protege contra variaciones imprevistas en la <em>demanda</em> o en el <em>tiempo de entrega</em> del proveedor.</p>
    <h4>Fórmula principal</h4>
    <div class="formula">SS = Z × σD × √LT

Z   = factor de nivel de servicio (z-score)
σD  = desviación estándar de la demanda diaria
LT  = lead time (días de entrega del proveedor)</div>
    <h4>Valores de Z según nivel de servicio</h4>
    <ul>
      <li>90% de servicio → Z = 1.28</li>
      <li>95% de servicio → Z = 1.645</li>
      <li>99% de servicio → Z = 2.326</li>
    </ul>
  `},
  {temaId:3, tipo:'concepto', titulo:'Ejemplos Resueltos de SS', cuerpo:`
    <div class="example">
      <strong>Ejemplo 1 (95% de servicio):</strong><br>
      σD = 10 unidades/día · LT = 4 días · Z = 1.645<br><br>
      SS = 1.645 × 10 × √4<br>
      SS = 1.645 × 10 × 2<br>
      SS = <strong>32.9 ≈ 33 unidades</strong>
    </div>
    <div class="example">
      <strong>Ejemplo 2 (99% de servicio):</strong><br>
      σD = 5 unidades/día · LT = 9 días · Z = 2.326<br><br>
      SS = 2.326 × 5 × √9<br>
      SS = 2.326 × 5 × 3<br>
      SS = <strong>34.89 ≈ 35 unidades</strong>
    </div>
    <p style="font-size:12px;color:var(--text-dim);margin-top:8px">A mayor nivel de servicio → mayor Z → mayor SS. Siempre redondear hacia arriba.</p>
  `},
  {temaId:3, tipo:'concepto', titulo:'Punto de Reorden (ROP)', cuerpo:`
    <h4>¿Qué es el ROP?</h4>
    <p>El nivel de inventario en el que se debe lanzar el pedido al proveedor para no quedarse sin stock.</p>
    <div class="formula">ROP = (Demanda promedio diaria × LT) + SS</div>
    <div class="example">
      <strong>Ejemplo:</strong><br>
      Demanda promedio = 20 unidades/día<br>
      LT = 4 días · SS = 33 unidades<br><br>
      ROP = (20 × 4) + 33<br>
      ROP = 80 + 33 = <strong>113 unidades</strong><br><br>
      Cuando el inventario baje a 113 unidades → hacer el pedido.
    </div>
    <h4>Fecha de entrega esperada</h4>
    <div class="formula">Fecha de entrega = Fecha de pedido + LT (días hábiles)</div>
  `},
  {temaId:3, tipo:'especial', titulo:'Proporciones y Porcentajes', cuerpo:`
    <div class="badge-special">⚠️ Contenido de examen</div>
    <h4>% de variación de la demanda</h4>
    <div class="formula">% variación = (|Real − Estimado| / Estimado) × 100</div>
    <div class="example">
      Estimado: 200 · Real: 230<br>
      % = (|230-200|/200) × 100 = (30/200) × 100 = <strong>15%</strong>
    </div>
    <h4>Proporción SS respecto al inventario total</h4>
    <div class="formula">Proporción = SS / (Stock normal + SS)</div>
    <div class="example">
      Stock normal = 80 · SS = 33<br>
      Proporción = 33/(80+33) = 33/113 ≈ <strong>29.2%</strong>
    </div>
  `},

  /* ── TEMA 4 ── */
  {temaId:4, tipo:'portada', titulo:'Sistema Just In Time (JIT)', cuerpo:''},
  {temaId:4, tipo:'concepto', titulo:'¿Qué es el JIT?', cuerpo:`
    <p>Sistema de producción creado por <strong>Taiichi Ohno en Toyota</strong> (años 70). Principio: <em>producir solo lo que se necesita, cuando se necesita, en la cantidad que se necesita</em>.</p>
    <h4>Producción Empujada vs. Jalada</h4>
    <ul>
      <li><strong>Push (empujada):</strong> Se produce según pronósticos → puede generar exceso de inventario.</li>
      <li><strong>Pull (jalada):</strong> Se produce solo cuando el cliente lo demanda → sin sobreproducción. El JIT usa Pull.</li>
    </ul>
    <div class="formula">JIT = Producción jalada + Entregas frecuentes + Cero desperdicio</div>
  `},
  {temaId:4, tipo:'concepto', titulo:'Los 7 Desperdicios (Mudas)', cuerpo:`
    <p>El JIT identifica y elimina 7 tipos de desperdicio:</p>
    <ul>
      <li>1. <strong>Sobreproducción</strong> — fabricar más de lo necesario.</li>
      <li>2. <strong>Tiempo de espera</strong> — máquinas o personas ociosas.</li>
      <li>3. <strong>Transporte innecesario</strong> — mover materiales sin agregar valor.</li>
      <li>4. <strong>Sobreprocesamiento</strong> — pasos innecesarios en el proceso.</li>
      <li>5. <strong>Exceso de inventario</strong> — almacenar más de lo que se consume.</li>
      <li>6. <strong>Movimiento innecesario</strong> — operarios que se mueven sin productividad.</li>
      <li>7. <strong>Defectos</strong> — producción que requiere retrabajo o descarte.</li>
    </ul>
    <div class="formula">La sobreproducción es el peor desperdicio →
genera todos los demás.</div>
  `},
  {temaId:4, tipo:'concepto', titulo:'Herramientas del JIT', cuerpo:`
    <h4>Kanban</h4>
    <p>Tarjeta o señal visual que <em>autoriza</em> la producción o el movimiento de materiales. Es el mecanismo del sistema jalado.</p>
    <div class="example"><strong>Ejemplo:</strong> Cuando se vacía una caja de piezas, la tarjeta kanban "jala" la producción de más en la estación anterior.</div>
    <h4>Jidoka (autonomización)</h4>
    <p>La línea se <strong>detiene automáticamente</strong> cuando se detecta un defecto. Mejor parar que producir defectuoso.</p>
    <h4>Kaizen (mejora continua)</h4>
    <p>Mejoras pequeñas y diarias por todos los empleados. No grandes cambios esporádicos.</p>
    <h4>Proveedores JIT</h4>
    <p>Pocos proveedores, muy confiables, que entregan frecuentemente y sin defectos.</p>
  `},
  {temaId:4, tipo:'especial', titulo:'Ventajas, Desventajas y Trampas', cuerpo:`
    <div class="badge-special">⚠️ Para el examen</div>
    <h4>Ventajas del JIT</h4>
    <ul>
      <li>Reduce inventarios → menor costo de almacenamiento.</li>
      <li>Detecta defectos de calidad más rápido.</li>
      <li>Mayor flexibilidad ante cambios de demanda.</li>
    </ul>
    <h4>Desventajas del JIT</h4>
    <ul>
      <li>Muy vulnerable a interrupciones (huelgas, desastres naturales, pandemias).</li>
      <li>Requiere proveedores extremadamente confiables.</li>
      <li>No es apto para demanda muy impredecible.</li>
    </ul>
    <div class="formula">TRAMPA: El JIT NO elimina todo inventario →
lo reduce al mínimo necesario, no a cero.</div>
  `},

  /* ── TEMA 5 ── */
  {temaId:5, tipo:'portada', titulo:'Teoría de las Limitaciones (TOC)', cuerpo:''},
  {temaId:5, tipo:'concepto', titulo:'¿Qué es la TOC y el cuello de botella?', cuerpo:`
    <p>La <strong>Teoría de las Limitaciones</strong> fue desarrollada por <strong>Eliyahu Goldratt</strong> en su novela "La Meta" (1984). Premisa: <em>una cadena es tan fuerte como su eslabón más débil</em>.</p>
    <h4>Cuello de botella</h4>
    <p>El recurso o proceso con <strong>menor capacidad</strong> en el sistema. Define la velocidad máxima de toda la operación.</p>
    <div class="example">
      <strong>Ejemplo:</strong> Empaque: 100 und/h · Ensamble: 80 und/h · Pintura: 120 und/h<br><br>
      El cuello de botella es <strong>Ensamble (80 und/h)</strong>.<br>
      La fábrica NUNCA producirá más de 80 und/h.
    </div>
    <div class="formula">Throughput = velocidad a la que el sistema
genera dinero mediante ventas</div>
  `},
  {temaId:5, tipo:'concepto', titulo:'Los 5 Pasos de la TOC', cuerpo:`
    <ul>
      <li>1. <strong>IDENTIFICAR</strong> la limitación del sistema.</li>
      <li>2. <strong>EXPLOTAR</strong> al máximo la limitación (sin inversión extra, sacarle todo el provecho).</li>
      <li>3. <strong>SUBORDINAR</strong> todo lo demás a la limitación (el sistema entero trabaja al ritmo del cuello de botella).</li>
      <li>4. <strong>ELEVAR</strong> la limitación (invertir para aumentar su capacidad).</li>
      <li>5. <strong>VOLVER AL PASO 1</strong> — al resolver una limitación, aparece una nueva.</li>
    </ul>
    <div class="formula">TOC = proceso de mejora continua.
Siempre habrá una nueva limitación.</div>
    <div class="example"><strong>Regla de oro:</strong> Nunca dejar ocioso el cuello de botella. Una hora perdida ahí = una hora perdida en todo el sistema.</div>
  `},
  {temaId:5, tipo:'concepto', titulo:'OPT, BUILDNET, SERVE y SPLIT', cuerpo:`
    <h4>OPT (Optimized Production Technology)</h4>
    <p>Software de planificación de producción desarrollado con la TOC. Optimiza el flujo concentrándose en los cuellos de botella.</p>
    <h4>BUILDNET</h4>
    <p>Red de construcción del programa de producción. Visualiza la red de operaciones y sus dependencias para identificar dónde están las limitaciones.</p>
    <h4>SERVE</h4>
    <p>Proceso de atender la demanda del cliente a través del sistema, priorizando los recursos según la limitación.</p>
    <h4>SPLIT</h4>
    <p>División del lote de producción en <strong>sublotes más pequeños</strong> para reducir el tiempo de espera y acelerar el flujo.</p>
    <div class="formula">Lote de transferencia < Lote de proceso
→ reduce el tiempo de ciclo total</div>
  `},
  {temaId:5, tipo:'especial', titulo:'Errores comunes sobre cuellos de botella', cuerpo:`
    <div class="badge-special">⚠️ Trampas de examen</div>
    <ul>
      <li><strong>Error 1:</strong> Mejorar un proceso que NO es cuello de botella mejora el sistema. <em>FALSO</em> — solo mejora su eficiencia local; la producción total no cambia.</li>
      <li><strong>Error 2:</strong> El cuello de botella siempre es la máquina más antigua. <em>FALSO</em> — puede ser un trabajador, un proveedor, o un proceso administrativo.</li>
      <li><strong>Error 3:</strong> El cuello de botella no cambia. <em>FALSO</em> — al mejorarlo, aparece el siguiente (paso 5 de TOC).</li>
    </ul>
    <div class="formula">Diferencia SPLIT vs BUILDNET:
SPLIT = divide lotes para acelerar flujo.
BUILDNET = visualiza la red de operaciones.</div>
  `},

  /* ── TEMA 6 ── */
  {temaId:6, tipo:'portada', titulo:'Economía Naranja', cuerpo:''},
  {temaId:6, tipo:'concepto', titulo:'¿Qué es la Economía Naranja?', cuerpo:`
    <p>El conjunto de actividades que transforman la <strong>creatividad, el talento y la propiedad intelectual</strong> en bienes y servicios con valor económico y cultural.</p>
    <p>Término popularizado por <strong>Felipe Buitrago e Iván Duque</strong> para el BID en 2013.</p>
    <div class="formula">Economía Naranja = Creatividad + Herencia Cultural + Tecnología</div>
    <h4>¿Por qué naranja?</h4>
    <p>El color naranja representa creatividad, calor y vitalidad cultural. No tiene relación con frutas ni banderas.</p>
    <h4>Sectores</h4>
    <ul>
      <li>🎭 Artes y Patrimonio (museos, teatro, artesanías)</li>
      <li>🎵 Industrias Culturales (música, cine, libros, videojuegos)</li>
      <li>💻 Creaciones Funcionales (software, diseño, arquitectura)</li>
      <li>🌐 Economía Digital (apps, plataformas, e-commerce creativo)</li>
    </ul>
  `},
  {temaId:6, tipo:'concepto', titulo:'Economía Naranja y Desarrollo Sostenible', cuerpo:`
    <p>La Economía Naranja se vincula al desarrollo sostenible en 3 dimensiones:</p>
    <h4>Económica</h4>
    <p>Genera ingresos y empleo de alta calidad, especialmente para jóvenes y mujeres, sin depender de recursos naturales agotables.</p>
    <h4>Social</h4>
    <p>Preserva la identidad cultural, la inclusión y la diversidad. Los artesanos y artistas locales se benefician directamente.</p>
    <h4>Ambiental</h4>
    <p>Produce con huella ambiental baja. El software no contamina ríos; el diseño no tala bosques.</p>
    <div class="formula">ODS 8 (Trabajo decente) + ODS 11 (Ciudades sostenibles)
+ ODS 17 (Alianzas) → alineados con Economía Naranja</div>
    <div class="example"><strong>Costa Rica:</strong> Animación digital, software, turismo cultural, artesanías indígenas, música folclórica, diseño gráfico digital.</div>
  `},

  /* ── TEMA 7 ── */
  {temaId:7, tipo:'portada', titulo:'Riesgos del Trabajo', cuerpo:''},
  {temaId:7, tipo:'concepto', titulo:'Código de Trabajo — Título IV', cuerpo:`
    <p>El <strong>Título IV del Código de Trabajo de Costa Rica</strong>, Art. 193 y siguientes, establece el Régimen de Seguridad Social y la protección contra riesgos del trabajo.</p>
    <h4>Accidente de Trabajo</h4>
    <p>Evento <strong>súbito, violento e imprevisto</strong> que ocurre con ocasión del trabajo o en el trayecto al trabajo, que produce lesión corporal, perturbación funcional o muerte.</p>
    <h4>Previsión de accidentes</h4>
    <p>Las empresas deben implementar: capacitación, equipos de protección personal (EPP), señalización y revisiones periódicas.</p>
    <div class="formula">Accidente = súbito y violento
Enfermedad profesional = gradual por exposición prolongada</div>
  `},
  {temaId:7, tipo:'concepto', titulo:'Seguro de Riesgos del Trabajo (INS)', cuerpo:`
    <h4>Póliza obligatoria</h4>
    <p>Todo empleador en Costa Rica está <strong>obligado por ley</strong> a asegurar a sus trabajadores en el <strong>INS (Instituto Nacional de Seguros)</strong> contra riesgos del trabajo.</p>
    <h4>¿Qué cubre?</h4>
    <ul>
      <li>Atención médica y hospitalaria.</li>
      <li>Incapacidades temporales (pago del salario mientras no puede trabajar).</li>
      <li>Indemnización por incapacidad permanente.</li>
      <li>Pensión a beneficiarios en caso de muerte del trabajador.</li>
    </ul>
    <div class="formula">Empleador sin póliza → responsable directo
de todos los daños al trabajador accidentado</div>
  `},
  {temaId:7, tipo:'concepto', titulo:'3 Tipos de Riesgos del Trabajo', cuerpo:`
    <h4>Riesgos Físicos</h4>
    <p>Energías del ambiente que afectan el cuerpo:</p>
    <ul>
      <li>Ruido excesivo → daño auditivo.</li>
      <li>Vibraciones → daño músculo-esquelético.</li>
      <li>Temperatura extrema → golpe de calor o hipotermia.</li>
      <li>Radiación (UV, ionizante) → quemaduras, cáncer.</li>
    </ul>
    <h4>Riesgos Químicos</h4>
    <p>Sustancias que ingresan por inhalación, contacto o ingestión:</p>
    <ul>
      <li>Gases, vapores tóxicos, solventes.</li>
      <li>Polvos (polvo de sílice → silicosis).</li>
      <li>Plaguicidas y pesticidas.</li>
    </ul>
    <h4>Riesgos Biológicos</h4>
    <p>Seres vivos o sus derivados: bacterias, virus, hongos. Afectan principalmente a trabajadores de la salud, agricultura y saneamiento.</p>
  `},
  {temaId:7, tipo:'especial', titulo:'Diferencias Clave para el Examen', cuerpo:`
    <div class="badge-special">⚠️ Trampas de examen</div>
    <ul>
      <li><strong>Físico ≠ Mecánico:</strong> Los riesgos mecánicos (cortes con máquinas, golpes) son una categoría diferente. El físico = energía ambiental.</li>
      <li><strong>Biológico ≠ Químico:</strong> Un virus es biológico. Un pesticida es químico.</li>
      <li><strong>Accidente ≠ Enfermedad profesional:</strong> el accidente es súbito; la enfermedad es gradual.</li>
      <li><strong>CCSS ≠ INS:</strong> Los riesgos del trabajo los cubre el INS, no la CCSS. La CCSS cubre seguro de salud y pensión general.</li>
    </ul>
    <div class="formula">Silicosis (polvo de sílice) → QUÍMICO, no físico.
El polvo es una sustancia química particulada.</div>
  `},

  /* ── TEMA 8 ── */
  {temaId:8, tipo:'portada', titulo:'Normas ISO y OHSAS', cuerpo:''},
  {temaId:8, tipo:'concepto', titulo:'OHSAS 18001 vs ISO 45001', cuerpo:`
    <h4>OHSAS 18001 (antigua)</h4>
    <ul>
      <li>Publicada en 1999, actualizada en 2007.</li>
      <li>Enfoque <strong>reactivo</strong>: gestionar riesgos ya identificados.</li>
      <li>Desarrollada por organismos de certificación privados, no por ISO.</li>
      <li><strong>Reemplazada por ISO 45001 en 2018</strong>. Transición completada en 2021.</li>
    </ul>
    <h4>ISO 45001:2018 (actual)</h4>
    <ul>
      <li>Primera norma de ISO para Seguridad y Salud Ocupacional (SSO).</li>
      <li>Enfoque <strong>proactivo</strong>: prevención y mejora continua.</li>
      <li>Incluye <strong>participación de los trabajadores</strong> como requisito formal.</li>
      <li>Compatible con ISO 9001 e ISO 14001 (misma estructura de alto nivel).</li>
    </ul>
    <div class="formula">ISO 45001 reemplaza a OHSAS 18001.
OHSAS 18001 ya NO existe como norma vigente.</div>
  `},
  {temaId:8, tipo:'concepto', titulo:'ISO 9001 — Gestión de Calidad', cuerpo:`
    <p><strong>ISO 9001</strong> es la norma más certificada del mundo. Establece los requisitos para un Sistema de Gestión de Calidad (SGC).</p>
    <h4>Principios clave</h4>
    <ul>
      <li>Enfoque al cliente.</li>
      <li>Liderazgo de la alta dirección.</li>
      <li>Enfoque basado en procesos.</li>
      <li>Mejora continua (ciclo PHVA).</li>
      <li>Toma de decisiones basada en evidencia.</li>
    </ul>
    <div class="formula">Ciclo PHVA: Planificar → Hacer → Verificar → Actuar
(Plan → Do → Check → Act — ciclo de Deming)</div>
    <div class="example"><strong>Aplicación:</strong> Un hospital con ISO 9001 garantiza procesos de atención documentados, consistentes y en mejora continua.</div>
  `},
  {temaId:8, tipo:'concepto', titulo:'ISO 14001 — Gestión Ambiental', cuerpo:`
    <p><strong>ISO 14001:2015</strong> establece los requisitos para un Sistema de Gestión Ambiental (SGA). Ayuda a identificar, gestionar y reducir el impacto ambiental.</p>
    <h4>Puntos clave</h4>
    <ul>
      <li>Identificación de aspectos e impactos ambientales significativos.</li>
      <li>Cumplimiento con legislación ambiental vigente.</li>
      <li>Reducción de residuos, emisiones y consumo de recursos.</li>
      <li>Mejora continua del desempeño ambiental.</li>
    </ul>
    <div class="example"><strong>Ejemplo:</strong> Una empresa de café que certifica ISO 14001 gestiona el tratamiento de las aguas de lavado del café, reduciendo la contaminación de ríos locales.</div>
    <div class="formula">ISO 9001 + ISO 14001 + ISO 45001 = Sistema Integrado de Gestión (SIG)</div>
  `},
  {temaId:8, tipo:'especial', titulo:'Cuadro Comparativo de Normas', cuerpo:`
    <div class="badge-special">⚠️ Para el examen — cuadro comparativo</div>
    <table class="norma-table">
      <tr><th>Aspecto</th><th>ISO 9001</th><th>ISO 14001</th><th>ISO 45001</th></tr>
      <tr><td>Enfoque</td><td>Calidad</td><td>Ambiental</td><td>SSO</td></tr>
      <tr><td>Beneficiario</td><td>Cliente</td><td>Sociedad/Planeta</td><td>Trabajador</td></tr>
      <tr><td>Versión actual</td><td>2015</td><td>2015</td><td>2018</td></tr>
      <tr><td>Ciclo base</td><td>PHVA</td><td>PHVA</td><td>PHVA</td></tr>
      <tr><td>Reemplaza a</td><td>ISO 9001:2008</td><td>ISO 14001:2004</td><td>OHSAS 18001</td></tr>
    </table>
    <div class="formula" style="margin-top:12px">TRAMPA: No mezclar OHSAS 18001 (seguridad)
con ISO 9001 (calidad) → son ámbitos distintos.</div>
  `},

  {temaId:1, q:'¿Cuál es la diferencia fundamental entre misión y estrategia según Render?', opts:['La misión es el plan de acción; la estrategia define el propósito','La misión define el propósito de la organización; la estrategia es el plan para lograrlo','Ambas son equivalentes, solo cambia el contexto de uso','La estrategia define los valores; la misión define los clientes'], c:1, exp:'La misión establece QUÉ es y para quién existe la empresa. La estrategia es el CÓMO alcanzar esa misión competitivamente en el mercado.'},
  {temaId:1, q:'¿Cuál de las siguientes NO es una de las 3 formas de ventaja competitiva de Render?', opts:['Diferenciación','Costo','Respuesta','Monopolio'], c:3, exp:'Render plantea solo 3: diferenciación, liderazgo en costo y respuesta. El monopolio es una estructura de mercado, no una estrategia competitiva.'},
  {temaId:1, q:'Una empresa estandariza su producto para todo el mundo y centraliza todas las decisiones. ¿Qué estrategia global usa?', opts:['Multidoméstica','Internacional','Global','Transnacional'], c:2, exp:'La estrategia global = alta estandarización + centralización de decisiones. La multidoméstica descentraliza y adapta completamente al mercado local.'},

  {temaId:1, q:'McDonald\'s aplica el mismo sistema operativo globalmente pero adapta el menú a cada país. ¿Qué estrategia usa?', opts:['Global','Internacional','Multidoméstica','Transnacional'], c:3, exp:'La estrategia transnacional combina escala global (mismo sistema) con adaptación local (menú diferente por país). Es la más compleja de gestionar.'},
  {temaId:1, q:'¿Qué estrategia global usa las competencias internas para exportar con mínima adaptación al mercado local?', opts:['Global','Internacional','Multidoméstica','Transnacional'], c:1, exp:'La estrategia internacional exporta aprovechando las capacidades del país de origen, con poca o ninguna adaptación al mercado extranjero.'},
  {temaId:1, q:'Zara renueva sus colecciones cada 2 semanas siguiendo tendencias. ¿Qué tipo de ventaja competitiva usa principalmente?', opts:['Diferenciación','Costo','Respuesta','Calidad total'], c:2, exp:'Zara compite por respuesta: velocidad, agilidad y flexibilidad para adaptarse al mercado. No es diferenciación (no cobra precio premium) ni liderazgo en costo.'},
  {temaId:1, q:'Los aspectos culturales y éticos en AO global incluyen principalmente problemas de:', opts:['Exceso de inventario y sobreproducción','Corrupción, condiciones laborales y propiedad intelectual','Diseño de procesos y capacidad instalada','Mantenimiento preventivo de maquinaria'], c:1, exp:'Los desafíos éticos globales incluyen: corrupción, estándares laborales distintos entre países, piratería de propiedad intelectual y diferencias en regulaciones ambientales.'},

  /* ── TEMA 2 ── */
  {temaId:2, q:'¿Qué caracteriza al trueque como forma de comercio?', opts:['Usa moneda digital entre países','Es intercambio de bienes sin uso de dinero','Requiere intermediación bancaria obligatoria','Solo aplica entre países con acuerdos bilaterales'], c:1, exp:'El trueque es intercambio directo de bienes o servicios sin mediación de dinero. Es la forma más antigua de comercio.'},
  {temaId:2, q:'¿Cuál de los siguientes es un ejemplo de exportación TRADICIONAL de Costa Rica?', opts:['Dispositivos médicos','Software y tecnología','Café','Turismo médico'], c:2, exp:'El café es una exportación tradicional de Costa Rica (históricamente dominante). Los dispositivos médicos y el software son exportaciones no tradicionales de mayor valor agregado.'},
  {temaId:2, q:'La diferencia entre exportaciones e importaciones de un país se denomina:', opts:['Producto Interno Bruto','Balanza comercial','Reservas monetarias internacionales','Déficit fiscal'], c:1, exp:'Balanza comercial = Exportaciones − Importaciones. Si es positiva hay superávit; si es negativa hay déficit comercial.'},
  {temaId:2, q:'¿Qué organismo internacional regula el comercio mundial desde 1995?', opts:['FMI (Fondo Monetario Internacional)','BID (Banco Interamericano de Desarrollo)','OMC (Organización Mundial del Comercio)','ONU (Organización de Naciones Unidas)'], c:2, exp:'La OMC fue fundada en 1995 para regular y facilitar el comercio internacional entre países, sustituyendo al GATT (1947).'},
  {temaId:2, q:'El documento que funciona como contrato de transporte marítimo en comercio internacional se llama:', opts:['Factura comercial','Conocimiento de embarque (B/L)','Declaración aduanera (DUA)','Packing list'], c:1, exp:'El Bill of Lading (B/L) o conocimiento de embarque es el contrato entre el exportador y la naviera. La factura comercial describe precio y productos.'},
  {temaId:2, q:'¿Qué es un arancel en el comercio internacional?', opts:['Un subsidio que recibe el exportador nacional','Un impuesto que se cobra al importar un producto','Un permiso especial para exportar','Un acuerdo comercial entre dos países'], c:1, exp:'El arancel es un impuesto que cobra el gobierno del país importador sobre los productos que entran. El subsidio, en cambio, es una ayuda al exportador nacional.'},
  {temaId:2, q:'La ventaja comparativa en comercio internacional significa que los países deben:', opts:['Producir todo internamente para no depender de nadie','Especializarse en lo que producen con menor costo relativo e intercambiar con otros','Exportar la mayor cantidad posible de todos sus productos','Imponer aranceles altos para proteger toda la industria local'], c:1, exp:'La ventaja comparativa (David Ricardo) establece que cada país debe especializarse en producir lo que hace más eficientemente en términos relativos, e intercambiar con otros.'},
  {temaId:2, q:'Piña, melón y plantas ornamentales exportadas por Costa Rica son ejemplos de:', opts:['Exportaciones tradicionales','Exportaciones no tradicionales','Exportaciones de servicios','Exportaciones de capital financiero'], c:1, exp:'Piña, melón y plantas ornamentales son exportaciones no tradicionales. Las exportaciones tradicionales de Costa Rica son café, banano, azúcar y cacao.'},

  /* ── TEMA 3 ── */
  {temaId:3, q:'¿Para qué sirve el stock de seguridad en la gestión de inventarios?', opts:['Para aumentar las ventas en temporadas altas','Para protegerse contra variaciones imprevistas en la demanda o el tiempo de entrega','Para reducir el precio de compra negociando con proveedores','Para eliminar la necesidad de hacer pronósticos de demanda'], c:1, exp:'El stock de seguridad es un inventario extra (colchón) que cubre variaciones imprevistas en la demanda del cliente o retrasos del proveedor.'},
  {temaId:3, q:'En la fórmula SS = Z × σD × √LT, ¿qué representa la variable LT?', opts:['El nivel de servicio deseado por la empresa','La desviación estándar de la demanda diaria','El lead time o tiempo de entrega del proveedor','El lote de pedido económico óptimo'], c:2, exp:'LT = Lead Time: el tiempo en días que tarda el proveedor en entregar el pedido después de realizarlo. Se usa bajo raíz cuadrada porque el riesgo acumula de forma proporcional a ella.'},
  {temaId:3, q:'Si σD = 20 unidades, LT = 9 días y Z = 1.645, ¿cuál es el stock de seguridad?', opts:['29.6 unidades','98.7 unidades','60 unidades','180 unidades'], c:1, exp:'SS = 1.645 × 20 × √9 = 1.645 × 20 × 3 = 98.7 ≈ 99 unidades. La raíz cuadrada de 9 es 3.'},
  {temaId:3, q:'¿Qué nivel de servicio corresponde a Z = 2.326?', opts:['90%','95%','98%','99%'], c:3, exp:'Z = 2.326 corresponde al 99% de nivel de servicio. A mayor nivel de servicio, mayor Z y por tanto mayor stock de seguridad necesario.'},
  {temaId:3, q:'Un negocio tiene demanda promedio de 50 unidades/día, LT de 3 días y SS de 40 unidades. ¿Cuál es el Punto de Reorden (ROP)?', opts:['150 unidades','190 unidades','40 unidades','90 unidades'], c:1, exp:'ROP = (Demanda promedio × LT) + SS = (50 × 3) + 40 = 150 + 40 = 190 unidades. Cuando el inventario baje a 190, se hace el pedido.'},
  {temaId:3, q:'Si la demanda estimada era 100 unidades y la real fue 115, ¿cuál es el porcentaje de variación?', opts:['15%','85%','13%','1.15%'], c:0, exp:'% variación = (|115 − 100| / 100) × 100 = (15/100) × 100 = 15%. Se usa el valor absoluto de la diferencia.'},
  {temaId:3, q:'¿Qué sucede con el stock de seguridad si se aumenta el nivel de servicio del 90% al 99%?', opts:['Disminuye porque hay más control','Se mantiene igual','Aumenta porque Z aumenta de 1.28 a 2.326','Se vuelve cero porque el proveedor es más confiable'], c:2, exp:'Al aumentar el nivel de servicio, Z aumenta (de 1.28 a 2.326), lo que incrementa directamente el resultado de la fórmula SS = Z × σD × √LT.'},
  {temaId:3, q:'¿Qué indica el Punto de Reorden (ROP)?', opts:['El máximo de inventario permitido en el almacén','El nivel de inventario en el que se debe hacer el pedido al proveedor','El costo óptimo de hacer un pedido','La cantidad máxima a pedir por orden'], c:1, exp:'El ROP es el nivel de inventario que, cuando se alcanza, indica que es momento de lanzar un nuevo pedido al proveedor, considerando el tiempo de entrega y el stock de seguridad.'},

  /* ── TEMA 4 ── */
  {temaId:4, q:'¿Quién desarrolló el sistema Just In Time y en qué empresa?', opts:['Frederick Taylor en Ford Motors','Taiichi Ohno en Toyota','Henry Ford en Ford Motors','Eliyahu Goldratt en General Motors'], c:1, exp:'Taiichi Ohno desarrolló el JIT en Toyota (Japón) en los años 1970, como respuesta a la escasez de recursos y espacio disponible en Japón tras la Segunda Guerra Mundial.'},
  {temaId:4, q:'En el JIT, el sistema de producción utilizado es:', opts:['Empujado (Push): se produce basado en pronósticos','Jalado (Pull): se produce solo cuando el cliente demanda','Mixto: mitad empujado, mitad jalado según temporada','Aleatorio: según disponibilidad de materiales y máquinas'], c:1, exp:'El JIT usa producción jalada (Pull): nada se produce hasta que el cliente o la siguiente etapa del proceso lo "jala". Así se evita la sobreproducción.'},
  {temaId:4, q:'¿Cuál de los siguientes NO es uno de los 7 desperdicios (mudas) del JIT?', opts:['Sobreproducción','Tiempo de espera','Certificación de calidad ISO','Defectos y retrabajo'], c:2, exp:'Los 7 desperdicios son: sobreproducción, espera, transporte, sobreprocesamiento, exceso de inventario, movimiento innecesario y defectos. La certificación ISO no es un desperdicio.'},
  {temaId:4, q:'En el JIT, ¿qué es el Kanban?', opts:['Un tipo de inventario de seguridad','Una señal o tarjeta que autoriza la producción o movimiento de materiales','Un software de planificación de recursos empresariales','Un tipo de máquina automatizada japonesa'], c:1, exp:'Kanban es el mecanismo visual (tarjeta o señal) del JIT que "jala" la producción: cuando se vacía un contenedor, la tarjeta kanban autoriza producir más en la estación anterior.'},
  {temaId:4, q:'¿Cuál es la principal desventaja del sistema JIT?', opts:['Genera demasiado inventario de productos terminados','Es extremadamente costoso de implementar en cualquier tipo de empresa','Es muy vulnerable a interrupciones en la cadena de suministro','No se puede aplicar en empresas de manufactura moderna'], c:2, exp:'El JIT mantiene inventarios mínimos, por lo que cualquier interrupción (huelgas, desastres, pandemias) puede detener toda la producción. La pandemia COVID-19 evidenció esta vulnerabilidad a nivel global.'},
  {temaId:4, q:'El Jidoka en el contexto del JIT significa:', opts:['Producir la mayor cantidad posible en el menor tiempo','Detener la línea de producción cuando se detecta un defecto','Aumentar la velocidad de la línea para cumplir pedidos','Eliminar todos los proveedores externos y autoabastecerse'], c:1, exp:'Jidoka = "autonomización". Permite que máquinas o trabajadores detengan la línea al detectar un problema. Es preferible parar que continuar produciendo con defectos.'},
  {temaId:4, q:'El Kaizen en el contexto del JIT se refiere a:', opts:['Un tipo de desperdicio específico que hay que eliminar','Mejora grande y radical que se hace una vez al año','Mejora pequeña y continua que hacen todos los empleados todos los días','Un sistema japonés de control de inventario por lotes'], c:2, exp:'Kaizen = "cambio para mejor" en japonés. Representa mejoras pequeñas e incrementales hechas continuamente por todos los empleados, en oposición a grandes cambios esporádicos.'},
  {temaId:4, q:'¿Cuál afirmación sobre el JIT es CORRECTA?', opts:['El JIT elimina completamente todo el inventario de la empresa','El JIT solo puede aplicarse en empresas japonesas con cultura Toyota','El JIT reduce el inventario al mínimo necesario, pero no a cero','El JIT aumenta el número de proveedores para mayor seguridad ante fallas'], c:2, exp:'El JIT reduce inventarios al mínimo necesario pero no los elimina totalmente. También tiende a usar MENOS proveedores pero más confiables, no más proveedores.'},

  /* ── TEMA 5 ── */
  {temaId:5, q:'¿Quién desarrolló la Teoría de las Limitaciones (TOC)?', opts:['Frederick Taylor (administración científica)','Taiichi Ohno (Toyota Production System)','Eliyahu Goldratt (La Meta, 1984)','Peter Drucker (gestión por objetivos)'], c:2, exp:'Eliyahu Goldratt presentó la TOC en su novela "La Meta" (1984). Es una metodología de gestión que busca identificar y gestionar sistemáticamente los cuellos de botella del sistema.'},
  {temaId:5, q:'Empaque: 100 und/h · Ensamble: 60 und/h · Pintura: 110 und/h. ¿Cuál es el cuello de botella?', opts:['Empaque (100 und/h)','Ensamble (60 und/h)','Pintura (110 und/h)','No hay cuello de botella en este sistema'], c:1, exp:'El cuello de botella es el proceso con menor capacidad: Ensamble (60 und/h). El sistema NUNCA producirá más de 60 und/h, sin importar qué tan rápidos sean los otros procesos.'},
  {temaId:5, q:'¿Cuál es el orden correcto de los 5 pasos de la TOC?', opts:['Elevar → Identificar → Subordinar → Explotar → Volver al inicio','Identificar → Explotar → Subordinar → Elevar → Volver al inicio','Subordinar → Identificar → Explotar → Elevar → Finalizar','Explotar → Identificar → Elevar → Subordinar → Terminar el proceso'], c:1, exp:'Los 5 pasos son: 1-Identificar, 2-Explotar (sin inversión), 3-Subordinar (el resto al ritmo del cuello), 4-Elevar (invertir para aumentar capacidad), 5-Volver al paso 1.'},
  {temaId:5, q:'En la TOC, "explotar la limitación" (paso 2) significa:', opts:['Eliminar el cuello de botella comprando maquinaria nueva inmediatamente','Sacar el máximo provecho posible del cuello de botella sin inversión extra','Mover el cuello de botella a otra parte del proceso productivo','Dividir el cuello de botella en dos estaciones paralelas'], c:1, exp:'Explotar = maximizar el uso del recurso limitante SIN gastar dinero adicional. Ejemplo: no dejar inactivo el cuello de botella nunca, eliminar su tiempo de parada innecesario.'},
  {temaId:5, q:'¿Qué significa el principio SPLIT en la TOC/OPT?', opts:['Dividir la empresa en varias subsidiarias independientes','Dividir los lotes de producción en sublotes más pequeños para acelerar el flujo','Separar al personal en equipos especializados por función','Dividir el presupuesto entre múltiples proyectos de mejora'], c:1, exp:'SPLIT = dividir el lote de proceso en lotes de transferencia más pequeños. Así las piezas fluyen más rápido al siguiente proceso sin esperar que termine todo el lote.'},
  {temaId:5, q:'OPT en el contexto de la Teoría de las Limitaciones es:', opts:['Un tipo de cuello de botella específico de la industria','Software de planificación que optimiza la producción concentrándose en los cuellos de botella','Una norma ISO para la gestión de la producción industrial','Un sistema de inventario similar al JIT pero más avanzado'], c:1, exp:'OPT (Optimized Production Technology) es el software de planificación desarrollado junto a la TOC para gestionar la producción concentrándose en los recursos limitantes.'},
  {temaId:5, q:'¿Cuál afirmación sobre los cuellos de botella es CORRECTA según la TOC?', opts:['Una vez resuelto el cuello de botella, el sistema no tendrá más limitaciones jamás','El cuello de botella siempre es la máquina más antigua y desgastada','Al mejorar un cuello de botella, aparece uno nuevo en otra parte del sistema','El cuello de botella solo puede ser una máquina, nunca un proceso humano o administrativo'], c:2, exp:'La TOC establece que siempre existe una limitación. Al resolver una, el sistema mejora y otra parte se convierte en el nuevo cuello de botella → por eso el paso 5 es "volver al inicio".'},
  {temaId:5, q:'Si el cuello de botella procesa 50 piezas/hora y los demás procesos 120 piezas/hora, ¿cuál es la producción máxima del sistema?', opts:['120 piezas/hora (el proceso más rápido determina el techo)','50 piezas/hora sin importar la velocidad de los demás procesos','85 piezas/hora (promedio de todos los procesos)','Ilimitada si se trabaja 24 horas al día, 7 días a la semana'], c:1, exp:'El cuello de botella determina la velocidad máxima de todo el sistema. Aunque los demás procesen 120/hora, el sistema nunca producirá más de 50/hora (la velocidad del cuello de botella).'},

  /* ── TEMA 6 ── */
  {temaId:6, q:'¿Qué es la Economía Naranja?', opts:['La economía basada en la exportación de cítricos y frutas tropicales','El conjunto de actividades que transforman la creatividad y el talento en bienes con valor económico','La economía de los países latinoamericanos con bandera naranja','Un modelo económico de liberalización total del comercio'], c:1, exp:'La Economía Naranja (o Creativa) convierte creatividad, talento y propiedad intelectual en bienes y servicios con valor económico y cultural. El BID la definió en 2013.'},

/* ============================================================
   STATE
   ============================================================ */
const state = {
  quizQ: [],
  quizIdx: 0,
  quizAnswers: [],
};

/* ============================================================
   HOME
   ============================================================ */
function renderHome() {
  const cont = document.getElementById('home-temas');
  const subareas = [...new Set(TEMAS.map(t => t.subarea))];
  let html = '';
  subareas.forEach(sa => {
    html += `<div class="subarea-label">${sa}</div>`;
    TEMAS.filter(t => t.subarea === sa).forEach(t => {
      const col = `var(${t.color})`;
      const qs = QUIZ.filter(q => q.temaId === t.id).length;
      const cards = STUDY.filter(s => s.temaId === t.id).length;
      html += `<div class="tema-card" onclick="startStudyTema(${t.id})">
        <div class="tema-card-top">
          <span class="tema-icon">${t.emoji}</span>
          <div class="tema-info">
            <h3>${t.nombre}</h3>
            <p>${cards} tarjetas · ${qs} preguntas de quiz</p>
          </div>
        </div>
        <div class="tema-bar"><div class="tema-bar-fill" style="background:${col};width:100%"></div></div>
      </div>`;
    });
  });
  cont.innerHTML = html;
}

function goHome() {
  showView('home');
}

/* ============================================================
   STUDY
   ============================================================ */
function startStudy() {
  buildStudyView(STUDY);
  showView('study');
}

function startStudyTema(id) {
  buildStudyView(STUDY.filter(s => s.temaId === id));
  showView('study');
}

function buildStudyView(cards) {
  const bar = document.getElementById('study-bar');
  bar.innerHTML = cards.map((_, i) => `<div class="study-seg" id="seg-${i}"></div>`).join('');

  const cont = document.getElementById('cards-container');
  cont.innerHTML = cards.map((card, i) => {
    const t = TEMAS.find(t => t.id === card.temaId);
    const col = t ? `var(${t.color})` : 'var(--t1)';
    let inner = '';
    if (card.tipo === 'portada') {
      inner = `<div class="card-emoji">${t ? t.emoji : '📖'}</div>
        <div class="card-type">Tema ${t ? t.id : ''} — ${t ? t.subarea : ''}</div>
        <div class="card-title">${card.titulo}</div>
        <div class="card-habilidad"><strong>Habilidad evaluada:</strong><br>${t ? t.habilidad : ''}</div>
        <div class="card-body" style="color:var(--text-dim);font-size:13px"><strong>Contenido:</strong> ${t ? t.contenido : ''}</div>`;
    } else {
      inner = `<div class="card-type">${card.tipo === 'especial' ? '⚠️ Caso Especial' : '📖 Concepto'}</div>
        <div class="card-title">${card.titulo}</div>
        <div class="card-body">${card.cuerpo}</div>`;
    }
    const isLast = i === cards.length - 1;
    const temaId = t ? t.id : 0;
    return `<div class="card" style="--card-color:${col}" data-idx="${i}">
      ${inner}
      <div class="card-nav">
        <span class="card-counter">${i + 1} / ${cards.length}</span>
        ${isLast
          ? `<button class="btn btn-primary" style="padding:10px 20px;font-size:13px" onclick="startQuizTema(${temaId})">Quiz del tema 🎯</button>`
          : `<button class="btn btn-primary" style="padding:10px 20px;font-size:13px" onclick="scrollCard(${i + 1})">Siguiente →</button>`}
      </div>
    </div>`;
  }).join('');

  const total = cards.length;
  updateStudyNav(0, total);

  cont.addEventListener('scroll', () => {
    const h = cont.clientHeight || 1;
    const idx = Math.round(cont.scrollTop / h);
    document.querySelectorAll('.study-seg').forEach((s, i) => s.classList.toggle('done', i <= idx));
    updateStudyNav(idx, total);
  }, { passive: true });
}

function scrollCard(idx) {
  const cont = document.getElementById('cards-container');
  cont.scrollTo({ top: idx * cont.clientHeight, behavior: 'smooth' });
}

function navCard(dir) {
  const cont = document.getElementById('cards-container');
  const total = cont.querySelectorAll('.card').length;
  const current = Math.round(cont.scrollTop / (cont.clientHeight || 1));
  const next = Math.max(0, Math.min(total - 1, current + dir));
  cont.scrollTo({ top: next * cont.clientHeight, behavior: 'smooth' });
  updateStudyNav(next, total);
}

function updateStudyNav(idx, total) {
  const up = document.getElementById('btn-card-up');
  const dn = document.getElementById('btn-card-down');
  if (up) up.disabled = idx <= 0;
  if (dn) dn.disabled = idx >= total - 1;
}

/* ============================================================
   QUIZ
   ============================================================ */
function startQuiz() {
  setupQuiz([...QUIZ].sort(() => Math.random() - .5));
  showView('quiz');
}

function startQuizTema(temaId) {
  const pool = QUIZ.filter(q => q.temaId === temaId).sort(() => Math.random() - .5);
  setupQuiz(pool);
  showView('quiz');
}

function setupQuiz(pool) {
  state.quizQ = pool;
  state.quizIdx = 0;
  state.quizAnswers = [];
  renderQ();
}

/* Seguimiento de intentos por pregunta */
const qa = { n: 0, recorded: false, locked: false };

function initQA() {
  qa.n = 0; qa.recorded = false; qa.locked = false;
  document.getElementById('quiz-attempt-msg').classList.remove('show');
  document.getElementById('quiz-review-card').classList.remove('show');
  document.getElementById('quiz-exp').classList.remove('show');
}

function renderQ() {
  initQA();
  const q = state.quizQ[state.quizIdx];
  const t = TEMAS.find(t => t.id === q.temaId);
  const total = state.quizQ.length;

  document.getElementById('quiz-tema-label').textContent = t ? `${t.emoji} ${t.nombre}` : '';
  document.getElementById('quiz-counter').textContent = `${state.quizIdx + 1} / ${total}`;
  document.getElementById('quiz-prog').style.width = (state.quizIdx / total * 100) + '%';
  document.getElementById('quiz-q').textContent = q.q;

  document.getElementById('quiz-opts').innerHTML = q.opts.map((o, i) =>
    `<button class="opt" onclick="pickOpt(${i})">${o}</button>`
  ).join('');

  const btnNext = document.getElementById('btn-next');
  btnNext.classList.remove('show');
  btnNext.textContent = state.quizIdx < total - 1 ? 'Siguiente →' : 'Ver resultados';
}

function pickOpt(i) {
  if (qa.locked) return;
  const q = state.quizQ[state.quizIdx];
  qa.n++;
  const correct = i === q.c;

  /* Registrar PRIMER intento para la nota — nunca sobreescribir */
  if (!qa.recorded) {
    qa.recorded = true;
    state.quizAnswers.push({
      temaId: q.temaId, correct,
      q: q.q, exp: q.exp, chosen: q.opts[i], answer: q.opts[q.c]
    });
  }

  const opts = document.querySelectorAll('.opt');

  if (correct) {
    qa.locked = true;
    opts.forEach((o, j) => { o.setAttribute('disabled', ''); if (j !== i) o.classList.add('reveal'); });
    opts[i].classList.add('correct');
    document.getElementById('quiz-attempt-msg').classList.remove('show');
    document.getElementById('quiz-review-card').classList.remove('show');
    showQuizExp(q.exp, true);
    document.getElementById('btn-next').classList.add('show');
  } else {
    /* Flash rojo breve en la opción elegida */
    opts[i].classList.add('wrong-flash');
    setTimeout(() => opts[i].classList.remove('wrong-flash'), 520);

    if (qa.n >= 4) {
      /* 4.º fallo: revelar y bloquear */
      qa.locked = true;
      opts.forEach((o, j) => {
        o.setAttribute('disabled', '');
        if (j === q.c) o.classList.add('correct'); else o.classList.add('reveal');
      });
      document.getElementById('quiz-attempt-msg').classList.remove('show');
      document.getElementById('quiz-review-card').classList.remove('show');
      showQuizExp(q.exp, false);
      document.getElementById('btn-next').classList.add('show');
    } else if (qa.n === 3) {
      /* 3.er fallo: mostrar tarjeta de repaso */
      const left = 4 - qa.n;
      showAttemptMsg(`❌ Incorrecto — ${left} intento más. Repasá el concepto:`);
      showReviewCard(q.temaId);
    } else {
      /* 1.er o 2.º fallo */
      const left = 4 - qa.n;
      showAttemptMsg(`❌ Incorrecto — ${left} intentos restantes`);
      document.getElementById('quiz-review-card').classList.remove('show');
    }
  }
}

function showAttemptMsg(msg) {
  const el = document.getElementById('quiz-attempt-msg');
  el.textContent = msg;
  el.classList.add('show');
}

function showReviewCard(temaId) {
  const t = TEMAS.find(t => t.id === temaId);
  const card = STUDY.find(s => s.temaId === temaId && s.tipo !== 'portada');
  const col = t ? `var(${t.color})` : 'var(--t1)';
  let html = '';
  if (card) {
    html = `<div style="font-size:12px;color:${col};font-weight:700;margin-bottom:6px">${card.titulo}</div>${card.cuerpo}`;
  }
  document.getElementById('quiz-review-content').innerHTML = html;
  document.getElementById('btn-go-study').onclick = () => startStudyTema(temaId);
  document.getElementById('quiz-review-card').classList.add('show');
}

function showQuizExp(exp, correct) {
  const el = document.getElementById('quiz-exp');
  document.getElementById('quiz-exp-text').textContent = exp;
  el.style.borderColor = correct ? 'var(--good)' : 'var(--bad)';
  el.classList.add('show');
}

function nextQ() {
  state.quizIdx++;
  if (state.quizIdx >= state.quizQ.length) showResults();
  else renderQ();
}

/* ============================================================
   RESULTS
   ============================================================ */
function showResults() {
  showView('results');
  const answers = state.quizAnswers;
  const total = answers.length;
  const correctas = answers.filter(a => a.correct).length;
  const nota = Math.round(correctas / total * 100);

  const circ = 2 * Math.PI * 64;
  const arc = document.getElementById('gauge-arc');
  const notaEl = document.getElementById('gauge-nota');
  arc.style.stroke = nota >= 70 ? 'var(--good)' : nota >= 50 ? 'var(--t4)' : 'var(--bad)';

  setTimeout(() => {
    arc.style.strokeDashoffset = circ * (1 - nota / 100);
    let n = 0;
    const step = () => { n += 2; notaEl.textContent = Math.min(n, nota); if (n < nota) requestAnimationFrame(step); };
    requestAnimationFrame(step);
  }, 150);

  let fb = '';
  if (nota >= 90) fb = '⭐ ¡Excelente! Dominás el material del examen.';
  else if (nota >= 70) fb = '✅ Aprobado. Repasá los temas donde fallaste.';
  else if (nota >= 50) fb = '⚡ Regular. Necesitás más repaso antes del examen.';
  else fb = '🔥 Aún hay mucho por reforzar. ¡Repasá las tarjetas!';

  const fbEl = document.getElementById('results-feedback');
  fbEl.textContent = `${fb} (${correctas}/${total} correctas)`;
  fbEl.style.borderColor = nota >= 70 ? 'var(--good)' : nota >= 50 ? 'var(--t4)' : 'var(--bad)';

  document.getElementById('breakdown-list').innerHTML = TEMAS.map(t => {
    const ta = answers.filter(a => a.temaId === t.id);
    if (!ta.length) return '';
    const tc = ta.filter(a => a.correct).length;
    const pct = Math.round(tc / ta.length * 100);
    const col = `var(${t.color})`;
    return `<div class="breakdown-row">
      <div class="breakdown-row-top"><span>${t.emoji} ${t.nombre}</span><span style="color:${col}">${tc}/${ta.length}</span></div>
      <div class="breakdown-bar-bg"><div class="breakdown-bar-fill" style="background:${col};width:${pct}%"></div></div>
    </div>`;
  }).join('');

  const failed = answers.filter(a => !a.correct);
  const fSec = document.getElementById('failed-section');
  if (!failed.length) {
    fSec.style.display = 'none';
  } else {
    fSec.style.display = 'block';
    document.getElementById('failed-list').innerHTML = failed.map(f => `
      <div class="failed-item">
        <p><strong>❌ ${f.q}</strong></p>
        <p style="font-size:12px;color:var(--bad);margin-bottom:2px">Tu respuesta: ${f.chosen}</p>
        <p style="font-size:12px;color:var(--good);margin-bottom:0">Correcta: ${f.answer}</p>
        <div class="failed-exp">💡 ${f.exp}</div>
      </div>`).join('');
  }
}

   ============================================================ */
function showView(id) {
  document.querySelectorAll('.view').forEach(v => {
    v.classList.remove('active');
    v.style.display = '';
  });
  const el = document.getElementById(id);
  el.classList.add('active');
  /* El quiz necesita display:flex — se lo damos por inline style para ganar
     la cascada sin depender de especificidad de selectores */
  if (id === 'quiz') el.style.display = 'flex';
  el.scrollTop = 0;
}

/* ============================================================
   TECLADO — modo Estudiar
   ============================================================ */
document.addEventListener('keydown', e => {
  if (!document.getElementById('study').classList.contains('active')) return;
  if (e.key === 'ArrowDown' || e.key === 'PageDown') { e.preventDefault(); navCard(1); }
  if (e.key === 'ArrowUp'   || e.key === 'PageUp')   { e.preventDefault(); navCard(-1); }
});

/* ============================================================
   INIT
   ============================================================ */
renderHome();
</script>
